# SonarQube configuration for this repository

# Exclude test fixtures and example IaC from analysis.
# These directories contain intentionally invalid Terraform Configurations
# used for TFLint testing, and should not affect Quality Gate.
sonar.exclusions=tests/**,examples/**,scripts/**

# Optionally mark tests explicitly (not strictly required, but clearer intent)
# sonar.tests=tests/**
# sonar.test.inclusions=tests/**/*
